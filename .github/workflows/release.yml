name: build-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build-type:
        description: "manual override of build type"
        required: false
        default: "release"

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate tag
        run: |
          if [[ "${GITHUB_REF_NAME}" != v* ]]; then
            echo "Git tag must start with v."
            exit 1
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes ""

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary_extension: ""
          - goos: linux
            goarch: arm64
            binary_extension: ""
          - goos: darwin
            goarch: amd64
            binary_extension: ""
          - goos: darwin
            goarch: arm64
            binary_extension: ""
          - goos: windows
            goarch: amd64
            binary_extension: ".exe"
          - goos: windows
            goarch: arm64
            binary_extension: ".exe"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
        run: |
          mkdir -p dist
          binary_name="m3u8-saver${{ matrix.binary_extension }}"
          go build -trimpath -ldflags="-s -w" -o "dist/${binary_name}" ./cmd/m3u8-saver

      - name: Package archive
        run: |
          archive_name="m3u8-saver-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          binary_name="m3u8-saver${{ matrix.binary_extension }}"
          package_dir="dist/${archive_name}"

          mkdir -p "${package_dir}"
          cp "dist/${binary_name}" "${package_dir}/${binary_name}"
          cp "config.example.json" "${package_dir}/config.example.json"
          cd dist
          zip -r "${archive_name}.zip" "${archive_name}"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/m3u8-saver-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}.zip" \
            --clobber
